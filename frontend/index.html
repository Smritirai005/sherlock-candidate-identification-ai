<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sherlock — Candidate Identification</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:            #0d0f12;
    --panel:         #14171b;
    --panel-line:    #23272d;
    --ink:           #e7e6e1;
    --ink-dim:       #8b9098;
    --gold:          #c9a24b;
    --gold-dim:      #7a6535;
    --interviewer:   #5b8cae;
    --observer:      #6a6f77;
    --danger:        #b5533e;
    --ok:            #6f9c76;
    --radius: 3px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--panel-line);
    background:linear-gradient(180deg, #14171b, #0d0f12);
  }
  header .brand{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:19px;
    letter-spacing:0.02em;
  }
  header .brand span{ color:var(--gold); }
  header .case-id{ color:var(--ink-dim); font-size:12px; letter-spacing:0.08em; margin-top:2px; }
  header .invite{
    text-align:right; font-size:12px; color:var(--ink-dim); line-height:1.6;
  }
  header .invite b{ color:var(--ink); font-weight:500; }

  main{ display:grid; grid-template-columns: 1fr 340px; gap:0; }
  @media (max-width: 900px){ main{ grid-template-columns: 1fr; } }

  .board{ padding:24px 28px; }
  .board-title{
    font-family:'Space Grotesk', sans-serif; font-size:13px; letter-spacing:0.1em;
    color:var(--ink-dim); text-transform:uppercase; margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
  }
  .board-title .pulse{
    width:7px; height:7px; border-radius:50%; background:var(--gold);
    animation: pulse 1.6s infinite ease-in-out;
  }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.25; } }

  .cards{ display:flex; flex-direction:column; gap:12px; }

  .card{
    background:var(--panel); border:1px solid var(--panel-line); border-radius:var(--radius);
    padding:16px 18px; position:relative; transition: border-color .3s ease, box-shadow .3s ease;
  }
  .card.selected{
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold-dim), 0 0 24px -8px rgba(201,162,75,0.35);
  }
  .card-top{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .who{ display:flex; align-items:baseline; gap:10px; }
  .who .name{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:16px; }
  .role-tag{
    font-size:10px; letter-spacing:0.08em; text-transform:uppercase; padding:2px 7px;
    border-radius:2px; border:1px solid currentColor; font-family:'IBM Plex Mono', monospace;
  }
  .role-tag.candidate{ color: var(--gold); }
  .role-tag.interviewer{ color: var(--interviewer); }
  .role-tag.observer, .role-tag.unknown{ color: var(--observer); }

  .conf{ display:flex; align-items:center; gap:10px; }
  .conf .pct{ font-family:'IBM Plex Mono', monospace; font-size:18px; min-width:52px; text-align:right; }
  .meter{
    width:140px; height:6px; background:#22262c; border-radius:4px; overflow:hidden;
    position:relative;
  }
  .meter i{
    display:block; height:100%; background:linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius:4px; transition: width .5s ease;
  }

  .explain{ margin-top:10px; color:var(--ink-dim); font-size:12.5px; line-height:1.6; }

  .signals{
    margin-top:12px; border-top:1px dashed var(--panel-line); padding-top:10px;
    display:grid; grid-template-columns: 1fr; gap:5px;
  }
  .signal-row{
    display:grid; grid-template-columns: 120px 40px 1fr; gap:10px; align-items:center;
    font-size:11.5px; color:var(--ink-dim);
  }
  .signal-row .sname{ font-family:'IBM Plex Mono', monospace; color:#a9adb3; }
  .signal-row .sscore{ font-family:'IBM Plex Mono', monospace; text-align:right; }
  .signal-row .sreason{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .signal-row .sreason:hover{ white-space:normal; }

  .ambiguous-banner{
    background:#1c1409; border:1px solid #4a3a15; color:#d9b56a;
    padding:10px 14px; border-radius:var(--radius); font-size:12.5px; margin-bottom:16px;
    display:flex; gap:8px; align-items:center;
  }

  aside{
    background:var(--panel); border-left:1px solid var(--panel-line);
    padding:24px 20px; min-height:100vh;
  }
  aside .board-title{ margin-bottom:16px; }
  .log{ display:flex; flex-direction:column; gap:9px; }
  .log-line{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--ink-dim);
    line-height:1.5; border-left:2px solid var(--panel-line); padding-left:9px;
  }
  .log-line:first-child{ color:var(--ink); border-left-color:var(--gold); }

  footer{
    padding:16px 28px; color:var(--ink-dim); font-size:11px; border-top:1px solid var(--panel-line);
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">SHERLOCK<span>/</span>identify</div>
    <div class="case-id mono">CASE demo-meeting-001 &nbsp;·&nbsp; LIVE</div>
  </div>
  <div class="invite" id="invite-box">loading invite…</div>
</header>

<main>
  <div class="board">
    <div id="ambiguous-slot"></div>
    <div class="board-title"><span class="pulse"></span>Participants under evaluation</div>
    <div class="cards" id="cards">connecting…</div>
  </div>
  <aside>
    <div class="board-title">Evidence log</div>
    <div class="log" id="log"></div>
  </aside>
</main>

<footer>Signals are recomputed after every meeting event · confidence is normalized across current participants · this is a scripted demo meeting, not a live call</footer>

<script>
const cardsEl = document.getElementById('cards');
const logEl = document.getElementById('log');
const inviteEl = document.getElementById('invite-box');
const ambigEl = document.getElementById('ambiguous-slot');

function roleClass(role){
  if(role === 'candidate') return 'candidate';
  if(role === 'interviewer') return 'interviewer';
  return 'unknown';
}

function render(state){
  inviteEl.innerHTML = `
    Expected candidate: <b>${state.invite.candidate_name}</b><br>
    Interviewers: <b>${state.invite.interviewer_names.join(', ')}</b>
  `;

  ambigEl.innerHTML = state.is_ambiguous
    ? `<div class="ambiguous-banner">⚠ Confidence not yet decisive — Sherlock is withholding a final pick until the signals separate further.</div>`
    : '';

  const scores = Object.values(state.scores).sort((a,b) => b.confidence - a.confidence);

  cardsEl.innerHTML = scores.map(s => {
    const isSelected = s.participant_id === state.selected_candidate_id;
    const role = isSelected ? 'candidate' : s.role_guess;
    const pct = Math.round(s.confidence * 100);
    const signalsHtml = s.signals
      .filter(sig => sig.confidence_in_signal > 0.03)
      .map(sig => `
        <div class="signal-row">
          <span class="sname">${sig.signal_name}</span>
          <span class="sscore">${sig.score.toFixed(2)}</span>
          <span class="sreason" title="${sig.reason}">${sig.reason}</span>
        </div>
      `).join('');

    return `
      <div class="card ${isSelected ? 'selected' : ''}">
        <div class="card-top">
          <div class="who">
            <span class="name">${s.display_name}</span>
            <span class="role-tag ${roleClass(role)}">${isSelected ? 'candidate — selected' : role}</span>
          </div>
          <div class="conf">
            <div class="meter"><i style="width:${pct}%"></i></div>
            <span class="pct">${pct}%</span>
          </div>
        </div>
        ${s.explanation ? `<div class="explain">${s.explanation}</div>` : ''}
        <div class="signals">${signalsHtml}</div>
      </div>
    `;
  }).join('') || '<div class="explain">Waiting for participants to join…</div>';

  logEl.innerHTML = [...state.event_log].reverse().map(l => `<div class="log-line">${l}</div>`).join('');
}

function connect(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = (ev) => render(JSON.parse(ev.data));
  ws.onclose = () => setTimeout(connect, 1500);
}
connect();
</script>
</body>
</html>
