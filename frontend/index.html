<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sherlock — Candidate Identification</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:            #0b0d10;
    --panel:         #15181d;
    --panel-2:       #1a1e24;
    --panel-line:    #262b32;
    --ink:           #edece7;
    --ink-dim:       #9298a1;
    --ink-faint:     #656b74;
    --gold:          #d7ae57;
    --gold-soft:     #f0dba6;
    --gold-dim:      #6b572e;
    --interviewer:   #6fa3c9;
    --interviewer-bg:#152530;
    --observer:      #7c828b;
    --observer-bg:   #1a1c20;
    --danger:        #c1665a;
    --ok:            #7fae6e;
    --radius: 6px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px; -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  header{
    display:flex; align-items:flex-start; justify-content:space-between;
    padding:22px 32px; border-bottom:1px solid var(--panel-line);
    background:linear-gradient(180deg, #15181d, #0b0d10);
  }
  header .brand{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:20px;
    letter-spacing:0.01em;
  }
  header .brand span{ color:var(--gold); }
  header .case-id{ color:var(--ink-faint); font-size:11.5px; letter-spacing:0.1em; margin-top:5px; }
  header .invite{
    text-align:right; font-size:12.5px; color:var(--ink-dim); line-height:1.9;
  }
  header .invite .label{ color:var(--ink-faint); margin-right:6px; }
  header .invite b{ color:var(--ink); font-weight:600; }

  main{ display:grid; grid-template-columns: 1fr 360px; gap:0; align-items:start; }
  @media (max-width: 920px){ main{ grid-template-columns: 1fr; } }

  .board{ padding:28px 32px; }
  .board-title{
    font-family:'Space Grotesk', sans-serif; font-size:12.5px; letter-spacing:0.12em;
    color:var(--ink-faint); text-transform:uppercase; margin-bottom:16px;
    display:flex; align-items:center; gap:9px;
  }
  .board-title .pulse{
    width:6px; height:6px; border-radius:50%; background:var(--gold);
    animation: pulse 1.6s infinite ease-in-out; flex-shrink:0;
  }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.25; } }

  .cards{ display:flex; flex-direction:column; gap:14px; }

  .card{
    background:var(--panel); border:1px solid var(--panel-line); border-radius:var(--radius);
    padding:20px 22px; position:relative; transition: border-color .3s ease, box-shadow .3s ease;
  }
  .card.selected{
    border-color: var(--gold-dim);
    box-shadow: 0 0 0 1px var(--gold-dim), 0 8px 28px -12px rgba(215,174,87,0.28);
  }
  .card-top{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    flex-wrap:wrap; row-gap:10px;
  }
  .who{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .who .name{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:17px; }
  .role-tag{
    font-size:10px; letter-spacing:0.07em; text-transform:uppercase; padding:3px 8px;
    border-radius:20px; font-family:'IBM Plex Mono', monospace; white-space:nowrap;
  }
  .role-tag.candidate{ color: var(--gold-soft); background:rgba(215,174,87,0.14); border:1px solid rgba(215,174,87,0.4); }
  .role-tag.interviewer{ color: var(--interviewer); background:var(--interviewer-bg); border:1px solid rgba(111,163,201,0.35); }
  .role-tag.observer, .role-tag.unknown{ color: var(--observer); background:var(--observer-bg); border:1px solid var(--panel-line); }

  .conf{ display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .conf .pct{ font-family:'IBM Plex Mono', monospace; font-weight:500; font-size:20px; min-width:50px; text-align:right; }
  .meter{
    width:130px; height:5px; background:#22262d; border-radius:4px; overflow:hidden;
  }
  .meter i{
    display:block; height:100%; background:linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius:4px; transition: width .5s ease;
  }

  .explain{
    margin-top:14px; padding-top:14px; border-top:1px solid var(--panel-line);
    color:var(--ink-dim); font-size:13px; line-height:1.65;
  }

  .signals{ margin-top:16px; display:flex; flex-direction:column; gap:8px; }
  .signal-row{
    background:var(--panel-2); border:1px solid var(--panel-line); border-radius:5px;
    padding:10px 13px;
  }
  .signal-head{
    display:grid; grid-template-columns: minmax(0,1fr) 46px; align-items:baseline;
    column-gap:12px; margin-bottom:7px;
  }
  .signal-head .sname{
    font-size:12px; font-weight:500; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;
  }
  .signal-head .sscore{
    font-family:'IBM Plex Mono', monospace; font-size:12px; font-weight:500;
    text-align:right; flex-shrink:0;
  }
  .sbar-track{
    height:5px; background:#22262d; border-radius:3px; overflow:hidden; margin-bottom:8px;
  }
  .sbar-track i{ display:block; height:100%; border-radius:3px; transition:width .45s ease; }
  .signal-row .sreason{
    font-size:12px; color:var(--ink-dim); line-height:1.55;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  .ambiguous-banner{
    background:#1c1409; border:1px solid #4a3a15; color:var(--gold-soft);
    padding:12px 16px; border-radius:var(--radius); font-size:13px; margin-bottom:18px;
    display:flex; gap:10px; align-items:flex-start; line-height:1.5;
  }

  aside{
    background:var(--panel); border-left:1px solid var(--panel-line);
    padding:28px 22px; min-height:100vh;
  }
  aside .board-title{ margin-bottom:18px; }
  .log{ display:flex; flex-direction:column; gap:11px; }
  .log-line{
    font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--ink-faint);
    line-height:1.6; border-left:2px solid var(--panel-line); padding-left:10px;
  }
  .log-line:first-child{ color:var(--ink-dim); border-left-color:var(--gold); }

  footer{
    padding:18px 32px; color:var(--ink-faint); font-size:11px; border-top:1px solid var(--panel-line);
    line-height:1.6;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">SHERLOCK<span>/</span>identify</div>
    <div class="case-id mono">CASE demo-meeting-001&nbsp;&nbsp;·&nbsp;&nbsp;LIVE</div>
  </div>
  <div class="invite" id="invite-box">loading invite…</div>
</header>

<main>
  <div class="board">
    <div id="ambiguous-slot"></div>
    <div class="board-title"><span class="pulse"></span>Participants under evaluation</div>
    <div class="cards" id="cards">connecting…</div>
  </div>
  <aside>
    <div class="board-title">Evidence log</div>
    <div class="log" id="log"></div>
  </aside>
</main>

<footer>Signals recompute after every meeting event · confidence is normalized across current participants · this is a scripted demo meeting, not a live call</footer>

<script>
const cardsEl = document.getElementById('cards');
const logEl = document.getElementById('log');
const inviteEl = document.getElementById('invite-box');
const ambigEl = document.getElementById('ambiguous-slot');

function roleClass(role){
  if(role === 'candidate') return 'candidate';
  if(role === 'interviewer') return 'interviewer';
  return 'unknown';
}

const SIGNAL_LABELS = {
  name_match: 'Name match',
  email_match: 'Email match',
  interviewer_elimination: 'Interviewer check',
  speaking_ratio: 'Speaking time',
  llm_role: 'AI reasoning',
};
function signalLabel(name){
  return SIGNAL_LABELS[name] || name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}
function scoreColor(score){
  if (score >= 0.62) return 'var(--gold)';
  if (score <= 0.38) return 'var(--danger)';
  return 'var(--ink-faint)';
}

function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render(state){
  inviteEl.innerHTML = `
    <div><span class="label">Expected candidate</span><b>${esc(state.invite.candidate_name)}</b></div>
    <div><span class="label">Interviewers</span><b>${esc(state.invite.interviewer_names.join(', '))}</b></div>
  `;

  ambigEl.innerHTML = state.is_ambiguous
    ? `<div class="ambiguous-banner">⚠&nbsp; Confidence not yet decisive — Sherlock is withholding a final pick until the signals separate further.</div>`
    : '';

  const scores = Object.values(state.scores).sort((a,b) => b.confidence - a.confidence);

  cardsEl.innerHTML = scores.map(s => {
    const isSelected = s.participant_id === state.selected_candidate_id;
    const role = isSelected ? 'candidate' : s.role_guess;
    const pct = Math.round(s.confidence * 100);
    const signalsHtml = s.signals
      .filter(sig => sig.confidence_in_signal > 0.03)
      .map(sig => {
        const barPct = Math.max(2, Math.round(sig.score * 100));
        const color = scoreColor(sig.score);
        return `
        <div class="signal-row">
          <div class="signal-head">
            <span class="sname" title="${esc(sig.signal_name)}">${esc(signalLabel(sig.signal_name))}</span>
            <span class="sscore" style="color:${color}">${sig.score.toFixed(2)}</span>
          </div>
          <div class="sbar-track"><i style="width:${barPct}%; background:${color}"></i></div>
          <div class="sreason" title="${esc(sig.reason)}">${esc(sig.reason)}</div>
        </div>
      `;
      }).join('');

    return `
      <div class="card ${isSelected ? 'selected' : ''}">
        <div class="card-top">
          <div class="who">
            <span class="name">${esc(s.display_name)}</span>
            <span class="role-tag ${roleClass(role)}">${isSelected ? 'candidate — selected' : role}</span>
          </div>
          <div class="conf">
            <div class="meter"><i style="width:${pct}%"></i></div>
            <span class="pct">${pct}%</span>
          </div>
        </div>
        ${s.explanation ? `<div class="explain">${esc(s.explanation)}</div>` : ''}
        <div class="signals">${signalsHtml}</div>
      </div>
    `;
  }).join('') || '<div class="explain">Waiting for participants to join…</div>';

  logEl.innerHTML = [...state.event_log].reverse().map(l => `<div class="log-line">${esc(l)}</div>`).join('');
}

function connect(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = (ev) => render(JSON.parse(ev.data));
  ws.onclose = () => setTimeout(connect, 1500);
}
connect();
</script>
</body>
</html>
